<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Confirmed — Alternadox Press</title>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #eeeae2;
    color: #1a1a18;
    font-family: 'Courier Prime', 'Courier New', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    text-align: center;
  }
  .logo {
    font-size: 14px;
    letter-spacing: 0.1em;
    font-weight: 700;
    margin-bottom: 64px;
    opacity: 0.5;
  }
  .mark {
    font-size: 48px;
    margin-bottom: 24px;
  }
  h1 {
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 700;
    letter-spacing: 0.06em;
    margin-bottom: 20px;
    line-height: 1.1;
  }
  .rule {
    width: 120px;
    height: 1px;
    background: #1a1a18;
    margin: 24px auto;
    opacity: 0.3;
  }
  p {
    font-size: 15px;
    line-height: 1.85;
    color: #4a4a44;
    max-width: 480px;
    font-style: italic;
  }
  .btn {
    display: inline-block;
    margin-top: 40px;
    background: #1a1a18;
    color: #eeeae2;
    font-family: 'Courier Prime', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 12px 28px;
    text-decoration: none;
    transition: background 0.15s, color 0.15s;
    border: 1px solid #1a1a18;
  }
  .btn:hover { background: #eeeae2; color: #1a1a18; }
</style>
</head>
<body>
  <div class="logo">ALTERNADOX PRESS</div>
  <div class="mark">✓</div>
  <h1>Order Confirmed.</h1>
  <div class="rule"></div>
  <p>
    Thank you for your order. A confirmation and receipt has been sent
    to your email. Your books will be on their way shortly.
  </p>
  <a href="/" class="btn">← Back to the store</a>
</body>
</html>
